[window]
    decorations = "Full"
    opacity = 1.0
    startup_mode = "Maximized"
    title = ""

[scrolling]
    history = 10000
    multiplier = 5


[font]
    builtin_box_drawing = true

[cursor]
    style = { shape = "Beam", blinking = "Always" }

[terminal.shell]
    program = '/usr/bin/tmux'
    args = ['new-session', '-A', '-D', '-s', 'main']

